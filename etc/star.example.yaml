service:
  - name: test-1
    type: star
    listeners:    # 监听服务+handle
      # - listenerName: listener-0
      #   handlerName: handler-0

      # - listenerName: listener-1
      #   handlerName: handler-1

      - listenerName: listener-4
        handlerName: handler-2

# TODO:IO密集型场景使用单线程+事件消息模型进行处理,对比性能
listenerList:
  - name: listener-0
    type: tcp
    transport: tcp
    addr: 0.0.0.0:5170

  - name: listener-1
    type: tcp
    transport: tcp
    addr: 0.0.0.0:5171

  - name: listener-2
    type: tcp
    addr: 0.0.0.0:8086

  - name: listener-3
    type: proxy         # 代理功能,可以通过bridger与当前主机其他的listener建立通道
    transport: tcp
    # transport: kcp、http2
    addr: 0.0.0.0:8085
    settings:
      proxyName: listener-proxy-0
      bridger: bridger-0

  - name: listener-4
    type: ctrlproxy
    transport: tcp
    addr: 0.0.0.0:5172
    settings:
      connect:
        - proxyName: proxy-0
          bridgeName: bridger-0
          clientProxyName: clientProxy-0 
          streamId: stream-0
          ctrlProxyName: ctrlproxy-name-0
      clientProxy:
        - clientProxyName: clientProxy-0 
          streamId: dailer-0-stream-1  # 把客户端的流注册到
          addr: 192.168.3.2:80   # clientProxy代理的服务
          transport: tcp
          keyPassword: dsawdfsfweweefwfe
          ctrlProxyName: ctrlproxy-name-0
        
        - clientProxyName: clientProxy-1  
          streamId: dailer-0-stream-2  # 把客户端的流注册到
          addr: 192.168.3.3:80   # clientProxy代理的服务
          transport: tcp
          keyPassword: dsawdfsfweweefwfe
          ctrlProxyName: ctrlproxy-name-0
  

handlerList:
  - name: handler-0
    plugins: 
      - httpProxy
      - socks5

  - name: handler-1
    plugins: 
      - socks5
      - httpProxy

  - name: handler-2
    plugins: 
      - printer

# 废弃:后期单独开启一个流,进行控制和下发配置信息
# 校验密码连接后,服务端主动创建一个流后传递配置,再连接流通道
dailerList:
  - name: dailer-0
    type: clientProxy
    addr: 192.168.3.2:80 # 控制代理接口
    settings:
      connect:
        - clientProxyName: clientProxy-0
          keyPassword: dsawdfsfweweefwfe
  
  - name: dailer-1
    type: tcp
    addr: 0.0.0.0:8084 

# bridger用户进程间网络通讯
bridgerList:
  - name: bridger-0

routerList:
  - name: routers-0
    type: tcp
    addr: 0.0.0.0:8083 

